name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 46.224.7.46
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/deploy/apps/datev
            git fetch origin main
            git reset --hard origin/main

            # Clean slate (same pattern as frohzeitrakete deploy)
            docker compose down --remove-orphans || true
            docker container prune -f || true

            docker compose build

            # Migrations. The external staging_fzr_net is sometimes
            # not ready for DNS lookups immediately after `down`, so
            # retry a couple of times before giving up.
            for attempt in 1 2 3; do
              if docker compose run --rm datev_api alembic upgrade head; then
                break
              fi
              if [ "$attempt" = "3" ]; then
                echo "Migration failed after 3 attempts" >&2
                exit 1
              fi
              echo "Migration attempt $attempt failed, retrying in 5s..." >&2
              sleep 5
            done

            docker compose up -d --wait
            docker compose ps

            # Drop the Caddy site block for buchhaltung-api into the
            # shared conf.d that fzr_caddy mounts read-only, then ask
            # Caddy to reload. Idempotent: cmp avoids unnecessary reloads.
            mkdir -p /home/deploy/infra/caddy/conf.d
            if ! cmp -s infra/buchhaltung-api.caddy /home/deploy/infra/caddy/conf.d/buchhaltung-api.caddy; then
              cp infra/buchhaltung-api.caddy /home/deploy/infra/caddy/conf.d/buchhaltung-api.caddy
              docker exec fzr_caddy caddy reload --config /etc/caddy/Caddyfile
            fi
