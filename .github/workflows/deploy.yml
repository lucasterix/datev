name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 46.224.7.46
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/deploy/apps/datev
            git fetch origin main
            git reset --hard origin/main
            docker compose pull || true
            docker compose build
            docker compose run --rm datev_api alembic upgrade head
            docker compose up -d --wait
            docker compose ps
