name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 46.224.7.46
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/deploy/apps/datev
            git fetch origin main
            git reset --hard origin/main

            # Clean slate (same pattern as frohzeitrakete deploy)
            docker compose down --remove-orphans || true
            docker container prune -f || true

            docker compose build

            # === Diagnose: who actually serves the DB? ===
            echo "=== all containers ==="
            docker ps -a --format '{{.Names}}\t{{.Image}}\t{{.Status}}'
            echo "=== all networks ==="
            docker network ls
            echo "=== staging_fzr_net containers (with aliases) ==="
            docker network inspect staging_fzr_net 2>&1 | head -80 || true
            echo "=== Postgres-like containers ==="
            docker ps -a --format '{{.Names}}\t{{.Image}}' | grep -iE "postgres|pg" || echo "no postgres containers"

            # Migrations. Use container_name (fzr_postgres) since the
            # `postgres` service alias is scoped to the FZR compose
            # project and not visible from a `compose run --rm` here.
            DB_URL_OVERRIDE=$(grep -E '^DATABASE_URL=' .env | head -1 | sed 's|@postgres:|@fzr_postgres:|' | cut -d= -f2-)
            docker compose run --rm -e "DATABASE_URL=$DB_URL_OVERRIDE" datev_api alembic upgrade head

            docker compose up -d --wait
            docker compose ps

            # Drop the Caddy site block for buchhaltung-api into the
            # shared conf.d that fzr_caddy mounts read-only, then ask
            # Caddy to reload. Idempotent: cmp avoids unnecessary reloads.
            mkdir -p /home/deploy/infra/caddy/conf.d
            if ! cmp -s infra/buchhaltung-api.caddy /home/deploy/infra/caddy/conf.d/buchhaltung-api.caddy; then
              cp infra/buchhaltung-api.caddy /home/deploy/infra/caddy/conf.d/buchhaltung-api.caddy
              docker exec fzr_caddy caddy reload --config /etc/caddy/Caddyfile
            fi
