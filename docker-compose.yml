x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  datev_api:
    build:
      context: .
    container_name: datev_api
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging
    networks:
      - staging_fzr_net
      - caddy_proxy

networks:
  staging_fzr_net:
    external: true
  caddy_proxy:
    external: true
    name: caddy_proxy
